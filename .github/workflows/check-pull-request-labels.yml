name: "Check Pull Request labels"

on:
  pull_request:
    branches:
      - main
    types:
      - labeled
      - opened
      - reopened
      - synchronize
      - unlabeled

permissions: {}

jobs:
  check_labels:
    name: "Check Pull Request labels"
    runs-on: ubuntu-latest
    steps:
      - name: Check the labels
        uses: ludeeus/action-require-labels@be19cd7f04c6fad46a85336f9e9cebdf961807bb  # 2.0.0
        with:
          labels: >-
              bugfix, breaking-change, refactor, enhancement, ci, documentation,
              testing, repository, dependencies
